<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>בקשה למפה אישית</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="box">
  <h1>בקשה למפה אישית</h1>

  <div class="row">
    <div class="field">
      <label for="badgeNo">מספר יעל</label>
      <div class="badge-line">
        <input id="badgeNo" type="text" autocomplete="off">
        <button id="checkBtn" type="button">בדיקה</button>
        <button id="resetBtn" type="button" class="hidden">בדיקה מחדש</button>
      </div>
    </div>

    <div class="field">
      <label for="nameHe">שם בעברית</label>
      <input id="nameHe" type="text" disabled>
    </div>
  </div>

  <div class="row">
    <div class="field">
      <label for="email">אימייל</label>
      <div class="email-line">
        <input id="email" type="email" disabled>
        <button id="updateEmailBtn" type="button" disabled>עדכון אימייל</button>
      </div>
    </div>

    <div class="field checkbox-field">
      <label class="checkbox-row">
        <input id="publishAllowed" type="checkbox" disabled>
        <span>להפיץ את המפה שלי באתר</span>
      </label>

      <div id="publishHint" class="publish-hint warn"></div>
    </div>
  </div>

  <div id="pointsInfo" class="msg info"></div>

  <button id="submitBtn" type="button" disabled>שליחת בקשה</button>

  <div id="msg" class="msg"></div>
</div>

<script src="app.js"></script>
</body>
</html>
