<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>בקשה למפה אישית</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 620px;
      margin: 40px auto;
      padding: 20px;
      direction: rtl;
      background: #f7f7f7;
    }

    .box {
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 2px 10px #0002;
    }

    label {
      display: block;
      margin-top: 16px;
      font-weight: bold;
    }

    input[type="text"],
    input[type="email"] {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      margin-top: 6px;
      font-size: 16px;
    }

    .checkbox-row {
      margin-top: 18px;
      display: flex;
      gap: 8px;
      align-items: center;
      font-weight: bold;
    }

    button {
      margin-top: 24px;
      width: 100%;
      padding: 12px;
      font-size: 18px;
      cursor: pointer;
    }

    .msg {
      margin-top: 16px;
      font-weight: bold;
    }

    .ok {
      color: green;
    }

    .error {
      color: #b00020;
    }
  </style>
</head>
<body>

<div class="box">
  <h1>בקשה למפה אישית</h1>

  <label for="badgeNo">מספר יעל</label>
  <input id="badgeNo" type="text" autocomplete="off">

  <label for="nameHe">שם בעברית</label>
  <input id="nameHe" type="text">

  <label for="email">אימייל</label>
  <input id="email" type="email">

  <div class="checkbox-row">
    <input id="publishAllowed" type="checkbox">
    <label for="publishAllowed" style="margin:0;">להפיץ את המפה שלי באתר</label>
  </div>

  <button id="submitBtn">שליחת בקשה</button>

  <div id="msg" class="msg"></div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxBiYALrtPamzhLo-zM8TRXqkMi0e2i41h2GvQjjpfd25cgSdAU-E1px0nPZRYBDulO/exec';

const badgeInput = document.getElementById('badgeNo');
const nameInput = document.getElementById('nameHe');
const emailInput = document.getElementById('email');
const publishInput = document.getElementById('publishAllowed');
const msg = document.getElementById('msg');
const submitBtn = document.getElementById('submitBtn');

let lookupTimer = null;

badgeInput.addEventListener('input', () => {
  clearTimeout(lookupTimer);
  lookupTimer = setTimeout(fetchPerson, 500);
});

async function fetchPerson() {
  const badgeNo = badgeInput.value.trim();

  msg.textContent = '';
  msg.className = 'msg';

  if (!badgeNo) return;

  try {
    const res = await fetch(API_URL + '?badgeNo=' + encodeURIComponent(badgeNo));
    const data = await res.json();

    if (!data.ok) {
      showError('שגיאה בבדיקת מספר יעל');
      return;
    }

    if (!data.found) {
      nameInput.value = '';
      emailInput.value = '';
      showError('מספר יעל לא נמצא ברשימה. אפשר להשלים פרטים ידנית.');
      return;
    }

    if (data.person.nameHe) {
      nameInput.value = data.person.nameHe;
    }

    if (data.person.email) {
      emailInput.value = data.person.email;
    }

    showOk('הפרטים נמצאו ומולאו אוטומטית');

  } catch (err) {
    showError('שגיאה בקריאת הנתונים');
  }
}

submitBtn.addEventListener('click', async () => {
  const badgeNo = badgeInput.value.trim();
  const nameHe = nameInput.value.trim();
  const email = emailInput.value.trim();

  if (!badgeNo || !nameHe || !email) {
    showError('יש למלא מספר יעל, שם ואימייל לפני שליחה');
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = 'שולח...';

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({
        badgeNo,
        nameHe,
        email,
        publishAllowed: publishInput.checked
      })
    });

    const data = await res.json();

    if (!data.ok) {
      showError('שליחת הבקשה נכשלה');
      return;
    }

    showOk('הבקשה נשלחה בהצלחה');

    badgeInput.value = '';
    nameInput.value = '';
    emailInput.value = '';
    publishInput.checked = false;

  } catch (err) {
    showError('שגיאה בשליחת הבקשה');
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = 'שליחת בקשה';
  }
});

function showOk(text) {
  msg.textContent = text;
  msg.className = 'msg ok';
}

function showError(text) {
  msg.textContent = text;
  msg.className = 'msg error';
}
</script>

</body>
</html>
